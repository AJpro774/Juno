# Cloudflare Workers: static Juni IDE (assets-only SPA).
# Build: (cp -f sitemap.xml ide/public/sitemap.xml || true) && cd ide && npm install && npm run build
# Deploy: npx wrangler deploy
# Skip wasm-pack on CI — commit ide/public/pkg after compiler changes.

name = "juno"
compatibility_date = "2026-07-18"
workers_dev = true
preview_urls = true

[assets]
directory = "./ide/dist"
not_found_handling = "single-page-application"
