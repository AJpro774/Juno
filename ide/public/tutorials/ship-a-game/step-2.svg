<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Juni IDE highlighting scene edit">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9efe6"/>
      <stop offset="55%" stop-color="#f3efe6"/>
      <stop offset="100%" stop-color="#f0e0c8"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <rect x="0" y="0" width="960" height="56" fill="#f7f3eb" stroke="#1c19151f"/>
  <text x="20" y="36" font-family="Syne, sans-serif" font-size="28" font-weight="800" fill="#1c1915">Juni</text>
  <rect x="400" y="12" width="52" height="32" rx="6" fill="#0f6e56"/>
  <text x="426" y="33" text-anchor="middle" font-family="Syne, sans-serif" font-size="12" font-weight="700" fill="#f7fff9">Edit</text>
  <rect x="456" y="12" width="52" height="32" rx="6" fill="transparent" stroke="#1c191540"/>
  <text x="482" y="33" text-anchor="middle" font-family="Syne, sans-serif" font-size="12" font-weight="600" fill="#6b645a">Play</text>
  <rect x="820" y="12" width="64" height="32" rx="6" fill="#0f6e56"/>
  <text x="852" y="33" text-anchor="middle" font-family="Syne, sans-serif" font-size="12" font-weight="700" fill="#f7fff9">Run</text>
  <!-- File tree -->
  <rect x="12" y="68" width="140" height="460" fill="#f7f3eb" stroke="#1c19151f"/>
  <text x="24" y="92" font-family="Syne, sans-serif" font-size="10" font-weight="700" fill="#6b645a" letter-spacing="2">PROJECT</text>
  <text x="24" y="118" font-family="JetBrains Mono, monospace" font-size="11" fill="#1c1915">juni.toml</text>
  <text x="24" y="138" font-family="JetBrains Mono, monospace" font-size="11" fill="#0f6e56">scenes/main.jscene</text>
  <text x="24" y="158" font-family="JetBrains Mono, monospace" font-size="11" fill="#1c1915">src/main.juni</text>
  <!-- Editor -->
  <rect x="160" y="68" width="360" height="300" fill="#faf7f1" stroke="#1c19151f"/>
  <text x="176" y="96" font-family="JetBrains Mono, monospace" font-size="12" fill="#6b645a">fn update(dt: f32) {</text>
  <text x="192" y="116" font-family="JetBrains Mono, monospace" font-size="12" fill="#1c1915">move_player(dt);</text>
  <text x="176" y="136" font-family="JetBrains Mono, monospace" font-size="12" fill="#6b645a">}</text>
  <!-- Preview -->
  <rect x="528" y="68" width="220" height="300" fill="#12110f"/>
  <text x="544" y="92" font-family="Syne, sans-serif" font-size="10" font-weight="700" fill="#e8e1d48c" letter-spacing="2">SCENE</text>
  <rect x="560" y="140" width="48" height="48" rx="4" fill="#3d8b6e"/>
  <rect x="620" y="200" width="80" height="16" fill="#8b7355"/>
  <circle cx="640" cy="160" r="10" fill="#e8c547"/>
  <!-- Hierarchy / Inspector highlight -->
  <rect x="756" y="68" width="192" height="300" fill="#f7f3eb" stroke="#0f6e56" stroke-width="3"/>
  <text x="768" y="92" font-family="Syne, sans-serif" font-size="10" font-weight="700" fill="#0f6e56" letter-spacing="2">HIERARCHY</text>
  <rect x="768" y="104" width="168" height="24" rx="4" fill="rgba(15,110,86,0.15)"/>
  <text x="780" y="120" font-family="JetBrains Mono, monospace" font-size="11" fill="#0f6e56">Player</text>
  <text x="780" y="144" font-family="JetBrains Mono, monospace" font-size="11" fill="#6b645a">Platform</text>
  <text x="780" y="168" font-family="JetBrains Mono, monospace" font-size="11" fill="#6b645a">Coin</text>
  <text x="768" y="210" font-family="Syne, sans-serif" font-size="10" font-weight="700" fill="#6b645a" letter-spacing="2">INSPECTOR</text>
  <text x="768" y="236" font-family="JetBrains Mono, monospace" font-size="11" fill="#1c1915">x: 120</text>
  <text x="768" y="256" font-family="JetBrains Mono, monospace" font-size="11" fill="#1c1915">y:  80</text>
  <text x="768" y="276" font-family="JetBrains Mono, monospace" font-size="11" fill="#1c1915">sprite: player</text>
  <rect x="700" y="390" width="220" height="36" rx="6" fill="#0f6e56"/>
  <text x="810" y="413" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#f7fff9">2 À Edit entities &amp; transforms</text>
  <rect x="160" y="376" width="788" height="152" fill="#1c1915"/>
  <text x="176" y="404" font-family="Syne, sans-serif" font-size="10" font-weight="700" fill="#e8e1d48c" letter-spacing="2">CONSOLE</text>
  <text x="176" y="432" font-family="JetBrains Mono, monospace" font-size="12" fill="#e8e1d480">Scene loaded À scenes/main.jscene</text>
</svg>
