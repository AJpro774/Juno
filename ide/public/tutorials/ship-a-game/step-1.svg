<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Juni IDE highlighting Open Project">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9efe6"/>
      <stop offset="55%" stop-color="#f3efe6"/>
      <stop offset="100%" stop-color="#f0e0c8"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="960" height="56" fill="#f7f3eb" stroke="#1c19151f"/>
  <text x="20" y="36" font-family="Syne, sans-serif" font-size="28" font-weight="800" fill="#1c1915">Juni</text>
  <text x="88" y="34" font-family="Syne, sans-serif" font-size="11" font-weight="700" fill="#0f6e56" letter-spacing="2">V8</text>
  <!-- Open Project highlight -->
  <rect x="150" y="12" width="118" height="32" rx="6" fill="#0f6e56"/>
  <text x="209" y="33" text-anchor="middle" font-family="Syne, sans-serif" font-size="12" font-weight="700" fill="#f7fff9">Open Project</text>
  <rect x="278" y="12" width="108" height="32" rx="6" fill="transparent" stroke="#1c191540"/>
  <text x="332" y="33" text-anchor="middle" font-family="Syne, sans-serif" font-size="12" font-weight="600" fill="#6b645a">Demo Project</text>
  <rect x="820" y="12" width="64" height="32" rx="6" fill="#0f6e56"/>
  <text x="852" y="33" text-anchor="middle" font-family="Syne, sans-serif" font-size="12" font-weight="700" fill="#f7fff9">Run</text>
  <!-- Callout -->
  <path d="M209 44 L209 72" stroke="#0f6e56" stroke-width="2"/>
  <rect x="140" y="72" width="200" height="36" rx="6" fill="#0f6e56"/>
  <text x="240" y="95" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#f7fff9">1 · Open your game folder</text>
  <!-- Workspace -->
  <rect x="12" y="68" width="160" height="460" fill="#f7f3eb" stroke="#1c19151f"/>
  <text x="24" y="92" font-family="Syne, sans-serif" font-size="10" font-weight="700" fill="#6b645a" letter-spacing="2">PROJECT</text>
  <text x="24" y="120" font-family="JetBrains Mono, monospace" font-size="12" fill="#1c191580">No project yet</text>
  <rect x="180" y="68" width="500" height="320" fill="#faf7f1" stroke="#1c19151f"/>
  <text x="200" y="100" font-family="JetBrains Mono, monospace" font-size="13" fill="#6b645a">// open a project to edit source</text>
  <rect x="688" y="68" width="260" height="320" fill="#12110f"/>
  <text x="708" y="96" font-family="Syne, sans-serif" font-size="10" font-weight="700" fill="#e8e1d48c" letter-spacing="2">SCENE / PREVIEW</text>
  <text x="818" y="240" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#e8e1d473">Awaiting project&</text>
  <rect x="180" y="396" width="768" height="132" fill="#1c1915"/>
  <text x="200" y="424" font-family="Syne, sans-serif" font-size="10" font-weight="700" fill="#e8e1d48c" letter-spacing="2">CONSOLE</text>
  <text x="200" y="452" font-family="JetBrains Mono, monospace" font-size="12" fill="#e8e1d480">Ready.</text>
</svg>
