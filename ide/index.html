<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header class="top">
        <div class="brand">
          <span class="brand-mark">Juni</span>
          <span class="brand-tag">v5</span>
        </div>
        <div class="actions">
          <button type="button" id="open-project" class="ghost">Open Project</button>
          <button type="button" id="demo-project" class="ghost">Demo Project</button>
          <select id="examples" aria-label="Examples"></select>
          <div class="mode" role="group" aria-label="Preview mode">
            <button type="button" id="mode-2d" class="mode-btn is-active" data-mode="canvas2d">
              2D
            </button>
            <button type="button" id="mode-gpu" class="mode-btn" data-mode="webgpu">
              WebGPU
            </button>
          </div>
          <button type="button" id="docs-toggle" class="ghost">Docs</button>
          <button type="button" id="credits-toggle" class="ghost">Credits</button>
          <button type="button" id="run" class="run">Run</button>
        </div>
      </header>
      <div class="workspace">
        <main class="stage">
          <div class="main-row">
            <aside class="file-tree-pane">
              <div class="pane-head pane-head-light">Project</div>
              <div id="file-tree" class="file-tree" aria-label="Project files"></div>
            </aside>
            <div class="editor-pane">
              <div id="tab-bar" class="tab-bar" role="tablist" aria-label="Open files"></div>
              <div id="editor" class="editor" aria-label="Juni source editor"></div>
            </div>
            <aside class="preview-pane">
              <div class="pane-head">Preview</div>
              <div class="preview-body" id="preview-body">
                <p class="preview-empty" id="preview-empty">Run a Canvas2D or WebGPU example to draw here.</p>
                <canvas id="canvas2d" width="640" height="360" hidden></canvas>
                <canvas id="canvas-gpu" width="640" height="360" hidden></canvas>
              </div>
            </aside>
          </div>
          <aside class="console-pane">
            <div class="pane-head">Console</div>
            <pre id="console" class="console"></pre>
          </aside>
        </main>
        <aside id="docs-panel" class="docs-panel" aria-hidden="true">
          <div class="docs-head">
            <span id="side-panel-title">Docs</span>
            <button type="button" id="docs-close" class="ghost tight" aria-label="Close panel">
              Close
            </button>
          </div>
          <nav id="docs-nav" class="docs-nav" aria-label="Documentation"></nav>
          <article id="docs-body" class="docs-body"></article>
        </aside>
      </div>
    </div>
    <input type="file" id="zip-input" accept=".zip" hidden />
    <input type="file" id="folder-input" webkitdirectory multiple hidden />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
