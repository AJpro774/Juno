# Multi-arch Tauri desktop installers → GitHub Releases.
# Triggers on version tags (v9.1.0, v*) and manual workflow_dispatch.
#
# Code signing / notarization is secrets-driven:
# - macOS: APPLE_* secrets → codesign + notarytool (via tauri-cli)
# - Windows: WINDOWS_CERTIFICATE* (PFX/signtool) or AZURE_* trusted signing
# If those secrets are absent, the matrix still builds unsigned artifacts.
name: Release desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v9.1.0). Leave empty to draft from app version."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon + Intel
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
          # Linux x86_64 + aarch64 (native ARM runner when available)
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - platform: ubuntu-22.04-arm
            args: ""
            rust_targets: ""
          # Windows x86_64 + ARM64 (ARM runner when available on public repos)
          - platform: windows-latest
            args: ""
            rust_targets: ""
          - platform: windows-11-arm
            args: --target aarch64-pc-windows-msvc
            rust_targets: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ide/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install desktop npm deps
        working-directory: desktop
        run: npm install

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v__VERSION__"
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Detect signing secrets
        id: signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "macos=true" >> "$GITHUB_OUTPUT"
            echo "macOS signing secrets present — will codesign/notarize when Apple auth secrets are set."
          else
            echo "macos=false" >> "$GITHUB_OUTPUT"
            echo "macOS signing secrets absent — building unsigned."
          fi
          if [ -n "$WINDOWS_CERTIFICATE" ]; then
            echo "windows_pfx=true" >> "$GITHUB_OUTPUT"
            echo "windows_azure=false" >> "$GITHUB_OUTPUT"
            echo "Windows PFX secrets present — will Authenticode-sign via signtool."
          elif [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_TRUSTED_SIGNING_ACCOUNT" ]; then
            echo "windows_pfx=false" >> "$GITHUB_OUTPUT"
            echo "windows_azure=true" >> "$GITHUB_OUTPUT"
            echo "Azure Trusted Signing secrets present — will sign via azure-trusted-signing."
          else
            echo "windows_pfx=false" >> "$GITHUB_OUTPUT"
            echo "windows_azure=false" >> "$GITHUB_OUTPUT"
            echo "Windows signing secrets absent — building unsigned."
          fi

      # Broken/partial Apple certs make bundling fail; fall back to unsigned macOS builds.
      - name: Validate Apple certificate or clear for unsigned
        id: apple_cert
        if: runner.os == 'macOS' && steps.signing.outputs.macos == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CERT_PATH="${RUNNER_TEMP}/apple-cert.p12"
          KEYCHAIN="${RUNNER_TEMP}/juni-signing.keychain-db"
          PASS="$(openssl rand -base64 32)"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$PASS" "$KEYCHAIN"
          if security import "$CERT_PATH" -P "${APPLE_CERTIFICATE_PASSWORD:-}" -A -t cert -f pkcs12 -k "$KEYCHAIN"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "Apple certificate import OK."
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "Apple certificate import failed — clearing APPLE_* for unsigned macOS build."
            {
              echo "APPLE_CERTIFICATE="
              echo "APPLE_CERTIFICATE_PASSWORD="
              echo "APPLE_SIGNING_IDENTITY="
            } >> "$GITHUB_ENV"
          fi
          security delete-keychain "$KEYCHAIN" 2>/dev/null || true
          rm -f "$CERT_PATH"

      # App Store Connect API key (.p8) for notarytool when not using APPLE_ID/APPLE_PASSWORD.
      - name: Write Apple API key
        if: runner.os == 'macOS' && steps.signing.outputs.macos == 'true' && steps.apple_cert.outputs.ok == 'true'
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        shell: bash
        run: |
          if [ -z "$APPLE_API_PRIVATE_KEY" ] || [ -z "$APPLE_API_KEY" ]; then
            echo "No APPLE_API_PRIVATE_KEY — notarization will use APPLE_ID/APPLE_PASSWORD if set."
            exit 0
          fi
          KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s\n' "$APPLE_API_PRIVATE_KEY" > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          echo "Wrote App Store Connect API key for notarytool."

      # Import OV/EV .pfx and inject thumbprint into tauri.conf.json for this job only.
      - name: Import Windows certificate (PFX)
        if: runner.os == 'Windows' && steps.signing.outputs.windows_pfx == 'true'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $certDir = Join-Path $env:RUNNER_TEMP "windows-cert"
          New-Item -ItemType Directory -Force -Path $certDir | Out-Null
          $pfxPath = Join-Path $certDir "certificate.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE.Trim()))
          $secure = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $secure
          $thumbprint = $cert.Thumbprint
          Write-Host "Imported certificate thumbprint $thumbprint"

          $tsUrl = $env:WINDOWS_TIMESTAMP_URL
          if ([string]::IsNullOrWhiteSpace($tsUrl)) {
            $tsUrl = "http://timestamp.digicert.com"
          }

          $env:THUMBPRINT = $thumbprint
          $env:TS_URL = $tsUrl
          node -e "const fs=require('fs');const p='desktop/src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.bundle=c.bundle||{};c.bundle.windows=Object.assign({},c.bundle.windows||{},{certificateThumbprint:process.env.THUMBPRINT,digestAlgorithm:'sha256',timestampUrl:process.env.TS_URL});fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');"
          Write-Host "Configured Windows Authenticode signing in tauri.conf.json for this build."

      # Azure Trusted Signing when PFX secrets are not used.
      - name: Configure Azure Trusted Signing
        if: runner.os == 'Windows' && steps.signing.outputs.windows_azure == 'true'
        env:
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $endpoint = $env:AZURE_TRUSTED_SIGNING_ENDPOINT
          if ([string]::IsNullOrWhiteSpace($endpoint)) {
            $endpoint = "https://wus2.codesigning.azure.net"
          }
          $account = $env:AZURE_TRUSTED_SIGNING_ACCOUNT
          $profile = $env:AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE
          if ([string]::IsNullOrWhiteSpace($account) -or [string]::IsNullOrWhiteSpace($profile)) {
            throw "AZURE_TRUSTED_SIGNING_ACCOUNT and AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE are required."
          }

          # Stage under C:\azsign — SignTool dlib paths must not contain spaces.
          $stage = 'C:\azsign'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $clientVersion = '1.0.95'
          $nupkg = Join-Path $stage 'trusted-signing-client.zip'
          Write-Host "Downloading Microsoft.Trusted.Signing.Client $clientVersion..."
          Invoke-WebRequest `
            -Uri "https://www.nuget.org/api/v2/package/Microsoft.Trusted.Signing.Client/$clientVersion" `
            -OutFile $nupkg
          Expand-Archive -Path $nupkg -DestinationPath (Join-Path $stage 'client') -Force
          $dlib = Join-Path $stage 'client\bin\x64\Azure.CodeSigning.Dlib.dll'
          if (-not (Test-Path $dlib)) {
            throw "Azure.CodeSigning.Dlib.dll not found at $dlib"
          }

          $metaPath = Join-Path $stage 'metadata.json'
          @{
            Endpoint = $endpoint
            CodeSigningAccountName = $account
            CertificateProfileName = $profile
          } | ConvertTo-Json | Set-Content -Path $metaPath -Encoding utf8

          $signtool = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            throw "signtool.exe not found. Install a Windows 10/11 SDK on the runner."
          }

          # Quote paths; %1 is the file path Tauri substitutes.
          $signCmd = "`"$($signtool.FullName)`" sign /v /fd sha256 /tr http://timestamp.acs.microsoft.com /td sha256 /dlib `"$dlib`" /dmdf `"$metaPath`" `"%1`""
          $env:SIGN_CMD = $signCmd
          node -e "const fs=require('fs');const p='desktop/src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.bundle=c.bundle||{};c.bundle.windows=Object.assign({},c.bundle.windows||{},{signCommand:process.env.SIGN_CMD});fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');"
          Write-Host "Configured Azure Trusted Signing signCommand for this build."

      - name: Export Apple signing env for bundler
        if: runner.os == 'macOS' && steps.apple_cert.outputs.ok == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        shell: bash
        run: |
          # Multiline-safe export only when cert import already validated.
          {
            echo "APPLE_CERTIFICATE<<CERT_EOF"
            echo "$APPLE_CERTIFICATE"
            echo "CERT_EOF"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            echo "APPLE_API_KEY=$APPLE_API_KEY"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
          } >> "$GITHUB_ENV"

      - name: Build and publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Azure Trusted Signing credentials (used when signCommand is configured)
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          # Do not set empty APPLE_* keys here — that still triggers a failing security import.
          # Valid Apple signing vars come from GITHUB_ENV via the export step above.
        with:
          projectPath: desktop
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: Juni IDE ${{ steps.tag.outputs.name }}
          releaseBody: |
            Desktop installers for Juni IDE (multi-arch).

            Download the build that matches your OS and CPU, or use the [web download hub](/download/).

            Platforms: macOS (Apple Silicon + Intel), Windows 10/11 (x64 + ARM64), Linux (x86_64 + ARM64).
            Android: install the web IDE as a PWA (Add to Home Screen / Install app) — no native APK.

            macOS/Windows artifacts are signed when repository signing secrets validate; otherwise builds are unsigned.

            See CHANGELOG.md for notes.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
