# Build Juni Android APK (Bubblewrap TWA) and attach to GitHub Releases.
# Triggers on version tags (v*) and manual workflow_dispatch.
#
# Optional secrets for stable signing (recommended for production):
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD,
#   ANDROID_KEY_ALIAS (default: juni)
# Without secrets, an ephemeral keystore is generated per run (sideload OK; Asset Links fingerprint changes).
name: Release Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to upload APK to (e.g. v11.0.0). Empty = create/use draft from package version."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-twa

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          set -euo pipefail
          mkdir -p "$ANDROID_HOME/licenses"
          printf '\n24333f8a63b6825ea9c5514fbe7619360df93f3a' > "$ANDROID_HOME/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd' > "$ANDROID_HOME/licenses/android-sdk-preview-license"
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@1.24.1

      - name: Configure Bubblewrap paths
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.bubblewrap"
          # Prefer JAVA_HOME from setup-java
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > "$HOME/.bubblewrap/config.json"
          cat "$HOME/.bubblewrap/config.json"
          bubblewrap doctor || true

      - name: Resolve app version from tag / package
        id: ver
        working-directory: .
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag_name }}"
          if [ -z "$TAG" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ]; then
            TAG="v$(node -p "require('./ide/package.json').version")"
          fi
          RAW="${TAG#v}"
          # appVersionCode: 11.0.0 → 11000
          CODE=$(node -e "const p='$RAW'.split('.').map(Number); console.log((p[0]||0)*1000+(p[1]||0)*100+(p[2]||0))")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$RAW" >> "$GITHUB_OUTPUT"
          echo "version_code=$CODE" >> "$GITHUB_OUTPUT"

      - name: Patch twa-manifest version
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = 'twa-manifest.json';
          const m = JSON.parse(fs.readFileSync(path, 'utf8'));
          m.appVersionName = process.env.VER;
          m.appVersionCode = Number(process.env.CODE);
          fs.writeFileSync(path, JSON.stringify(m, null, 2) + '\n');
          console.log('version', m.appVersionName, m.appVersionCode);
          NODE
        env:
          VER: ${{ steps.ver.outputs.version }}
          CODE: ${{ steps.ver.outputs.version_code }}

      - name: Prepare signing keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          ALIAS="${ANDROID_KEY_ALIAS:-juni}"
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android.keystore
            echo "Using keystore from secrets."
            STORE_PASS="${ANDROID_KEYSTORE_PASSWORD:?missing ANDROID_KEYSTORE_PASSWORD}"
            KEY_PASS="${ANDROID_KEY_PASSWORD:?missing ANDROID_KEY_PASSWORD}"
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — generating ephemeral keystore for this run."
            STORE_PASS="$(openssl rand -base64 24)"
            KEY_PASS="$STORE_PASS"
            keytool -genkeypair \
              -keystore android.keystore \
              -alias "$ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$STORE_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=Juni IDE, OU=Juni, O=AJpro774, C=US" \
              -noprompt
          fi
          A="$ALIAS" node -e "
            const fs=require('fs');
            const m=JSON.parse(fs.readFileSync('twa-manifest.json','utf8'));
            m.signingKey={path:'./android.keystore',alias:process.env.A||'juni'};
            fs.writeFileSync('twa-manifest.json',JSON.stringify(m,null,2)+'\n');
          "
          echo "alias=$ALIAS" >> "$GITHUB_OUTPUT"
          {
            echo "BUBBLEWRAP_KEYSTORE_PASSWORD<<EOF"
            echo "$STORE_PASS"
            echo "EOF"
            echo "BUBBLEWRAP_KEY_PASSWORD<<EOF"
            echo "$KEY_PASS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Generate Android project from TWA manifest
        run: |
          set -euo pipefail
          # Init into this directory (non-interactive defaults). Prefer live web manifest URL.
          if [ ! -f app/build.gradle ] && [ ! -f app/build.gradle.kts ]; then
            yes "" | bubblewrap init \
              --manifest=https://junoengine.netlify.app/manifest.webmanifest \
              --directory=.
          fi
          test -f app/build.gradle -o -f app/build.gradle.kts

          # Enforce package id / host / signing / version on the generated manifest
          node -e '
            const fs = require("fs");
            const path = "twa-manifest.json";
            const m = JSON.parse(fs.readFileSync(path, "utf8"));
            m.packageId = "dev.juni.ide";
            m.host = "junoengine.netlify.app";
            m.name = "Juni IDE";
            m.launcherName = "Juni";
            m.startUrl = "/";
            m.webManifestUrl = "https://junoengine.netlify.app/manifest.webmanifest";
            m.fullScopeUrl = "https://junoengine.netlify.app/";
            m.iconUrl = "https://junoengine.netlify.app/icons/icon-512.png";
            m.maskableIconUrl = "https://junoengine.netlify.app/icons/icon-512.png";
            m.appVersionName = process.env.VER;
            m.appVersionCode = Number(process.env.CODE);
            m.signingKey = { path: "./android.keystore", alias: process.env.ALIAS || "juni" };
            fs.writeFileSync(path, JSON.stringify(m, null, 2) + "\n");
            console.log("patched", m.packageId, m.appVersionName, m.appVersionCode);
          '
          # Refresh Gradle project from patched manifest (no --manifest flag; cwd has twa-manifest.json)
          bubblewrap update --skipVersionUpgrade
        env:
          VER: ${{ steps.ver.outputs.version }}
          CODE: ${{ steps.ver.outputs.version_code }}
          ALIAS: ${{ steps.keystore.outputs.alias }}

      - name: Build signed APK
        run: |
          set -euo pipefail
          bubblewrap build --skipPwaValidation
          ls -la app-release-signed.apk 2>/dev/null || ls -la *.apk

      - name: Stage release asset
        id: apk
        run: |
          set -euo pipefail
          SRC=""
          for c in app-release-signed.apk ./app/build/outputs/apk/release/*.apk; do
            if [ -f "$c" ]; then SRC="$c"; break; fi
          done
          if [ -z "$SRC" ]; then
            SRC="$(find . -name '*.apk' -type f | head -1 || true)"
          fi
          if [ -z "$SRC" ] || [ ! -f "$SRC" ]; then
            echo "::error::No APK produced"
            find . -name '*.apk' -o -name '*.aab' | head -50
            exit 1
          fi
          OUT="Juni-IDE-android.apk"
          cp "$SRC" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          ls -lh "$OUT"
          # Print cert fingerprint for assetlinks
          keytool -printcert -jarfile "$OUT" 2>/dev/null | sed -n 's/.*SHA256: //p' | head -1 || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Juni-IDE-android-apk
          path: android-twa/Juni-IDE-android.apk

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name == '' }}
          files: android-twa/Juni-IDE-android.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
