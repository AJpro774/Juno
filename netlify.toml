# Netlify: build the flat canonical IDE at `ide/`. Publishes `ide/dist`.

[build]
  command = "(cp -f sitemap.xml ide/public/sitemap.xml || true) && cd ide && npm install && npm run build"
  publish = "ide/dist"

[build.environment]
  NODE_VERSION = "20"
  GITHUB_PAGES = "false"

# Static files in publish dir are served first; keep SPA fallback for app routes only.
# Explicit download hub + PWA assets (avoid SPA rewrite swallowing them on some hosts).
[[redirects]]
  from = "/download"
  to = "/download/"
  status = 301

[[redirects]]
  from = "/download/*"
  to = "/download/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
