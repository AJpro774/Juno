# Netlify: works with either a flat repo OR the nested github_upload_batches layout.

[build]
  # Nested layout (1_root_crates / 2_ide_runtime / 3_docs_examples):
  command = "cp -f 1_root_crates/CREDITS.md 2_ide_runtime/CREDITS.md && rm -rf 2_ide_runtime/docs && cp -R 3_docs_examples/docs 2_ide_runtime/docs && cd 2_ide_runtime/ide && npm install && npm run build"
  publish = "2_ide_runtime/ide/dist"

[build.environment]
  NODE_VERSION = "20"
  GITHUB_PAGES = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
