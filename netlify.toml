# Netlify: deploy the Juni IDE (static Vite app).
# Paths are relative to the repo root (no [build].base) so UI settings can match.

[build]
  command = "cd ide && npm ci && npm run build"
  publish = "ide/dist"

[build.environment]
  NODE_VERSION = "20"
  # Ensure Vite uses root base (not GitHub Pages /Juno/)
  GITHUB_PAGES = "false"

# SPA fallback for deep links / refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed assets; keep index fresh
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
