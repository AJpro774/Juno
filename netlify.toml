# Netlify: deploy the Juni IDE (static Vite app).
# Base path is "/" (unlike GitHub Pages which uses /Juno/ via GITHUB_PAGES=true).
#
# Prebuilt WASM lives in ide/public/pkg — rebuild locally with `npm run build:wasm`
# when the compiler changes, then commit, or install Rust + wasm-pack in the build image.

[build]
  base = "ide"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Ensure Vite uses root base (not GitHub Pages /Juno/)
  GITHUB_PAGES = "false"

# SPA fallback for deep links / refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed assets; keep index fresh
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
