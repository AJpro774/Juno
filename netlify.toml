# Netlify: prefer flat `ide/` (canonical) when present; fall back to nested
# GitHub upload batches (`1_root_crates` / `2_ide_runtime` / `3_docs_examples`).
# Always publishes `ide/dist`.

[build]
  # Flat first: both layouts often coexist on GitHub; nested batches can lag behind main.
  # Nested fallback: sync CREDITS + docs into 2_ide_runtime, build, copy dist → ide/dist.
  command = "if [ -f ide/package.json ]; then (cp -f sitemap.xml ide/public/sitemap.xml || true) && cd ide && npm install && npm run build; elif [ -d 2_ide_runtime/ide ]; then cp -f 1_root_crates/CREDITS.md 2_ide_runtime/CREDITS.md && rm -rf 2_ide_runtime/docs && cp -R 3_docs_examples/docs 2_ide_runtime/docs && (cp -f sitemap.xml 2_ide_runtime/ide/public/sitemap.xml || true) && cd 2_ide_runtime/ide && npm install && npm run build && cd ../.. && mkdir -p ide && rm -rf ide/dist && cp -R 2_ide_runtime/ide/dist ide/dist; else echo 'No ide/ or 2_ide_runtime/ide found' >&2; exit 1; fi"
  publish = "ide/dist"

[build.environment]
  NODE_VERSION = "20"
  GITHUB_PAGES = "false"

# Static files in publish dir are served first; keep SPA fallback for app routes only.
# Explicit download hub + PWA assets (avoid SPA rewrite swallowing them on some hosts).
[[redirects]]
  from = "/download"
  to = "/download/"
  status = 301

[[redirects]]
  from = "/download/*"
  to = "/download/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
